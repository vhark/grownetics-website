server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Fix port stripping on redirects behind port mapping
    absolute_redirect off;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Cache static assets
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|jpeg|webp|ico|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML - no cache
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Clean URLs - try .html extension
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
